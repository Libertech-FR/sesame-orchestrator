[group:api]
programs=api
priority=30

[program:api]
command = node ./dist/main.js
directory = /data/apps/api
process_name = %(program_name)s
numprocs = 1
startsecs = 0
autostart = true
autorestart = true
exitcodes = 0
stopsignal = TERM
restartsignal = HUP
reloadsignal = USR2
stopasgroup = true
killasgroup = true
stdout_events_enabled = false
stdout_logfile_maxbytes = 0
stdout_logfile = /dev/stdout
redirect_stderr = true
