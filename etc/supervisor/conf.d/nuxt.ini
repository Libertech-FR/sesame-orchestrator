[group:web]
programs=web
priority=20

[program:web]
command = /bin/bash ./entrypoint.sh
directory = /data/apps/web
process_name = %(program_name)s
numprocs = 1
startsecs = 0
autostart = true
autorestart = true
exitcodes = 0
stopsignal = TERM
restartsignal = HUP
reloadsignal = USR2
stopasgroup = true
killasgroup = true
stdout_events_enabled = false
stdout_logfile_maxbytes = 0
stdout_logfile = /dev/stdout
redirect_stderr = true
